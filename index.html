<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFG TikTok - Adris</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 20px; background: #111; border-bottom: 2px solid #ffcc00; }
        .video-box { height: 70vh; display: flex; align-items: center; justify-content: center; background: #050505; margin: 10px; border-radius: 15px; border: 1px solid #222; }
        .upload-btn { background: #ffcc00; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 18px; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3); }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="color: #ffcc00; margin: 0;">AFG TIK TOK V2</h2>
        <p style="font-size: 12px; color: #888;">Powered by Adris Rohani</p>
    </div>

    <div class="video-box" id="feed">
        <p id="status">ویډیوګانې به دلته راښکاره شي</p>
    </div>

    <input type="file" id="vInput" style="display:none" accept="video/*">
    <button class="upload-btn" onclick="document.getElementById('vInput').click()">+ ویډیو اپلوډ کړئ</button>

    <script>
        // ستا خپل ډیټابیس معلومات
        const S_URL = "https://xriyykhfntrjktkdlijl.supabase.co";
        const S_KEY = "sb_publishable_A-4CZgoE1jkKU8wXU9NNeEQ_hOvw-f_m";
        const supabaseClient = supabase.createClient(S_URL, S_KEY);

        document.getElementById('vInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('status').innerText = "انتظار وباسئ، ویډیو ستا ډیټابیس ته روانه ده...";
                
                const { data, error } = await supabaseClient.storage
                    .from('videos')
                    .upload('public/' + Date.now() + '_' + file.name, file);

                if (error) {
                    alert("خطا: " + error.message);
                    document.getElementById('status').innerText = "خطا راغله، بیا کوشش وکړئ.";
                } else {
                    alert("مبارک شه! ویډیو په بریالیتوب سره ستا په خپل ډیټابیس کې اپلوډ شوه.");
                    document.getElementById('status').innerText = "ویډیو په بریالیتوب سره اپلوډ شوه!";
                }
            }
        };
    </script>
</body>
</html>
