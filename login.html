<!DOCTYPE html>
<html lang="ps">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFG TikTok - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 15px;
            background: #111;
        }
        h2 { color: #fe2c55; } /* TikTok Red Color */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-login { background-color: #fe2c55; color: white; }
        .btn-signup { background-color: transparent; color: #fe2c55; border: 1px solid #fe2c55; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>AFG TikTok</h2>
    <input type="email" id="email" placeholder="ایمیل ولیکئ">
    <input type="password" id="password" placeholder="پټ نوم (Password)">
    <button class="btn-login" onclick="login()">لاګ ان</button>
    <button class="btn-signup" onclick="signup()">نوی اکاونټ جوړول</button>
    <p id="message"></p>
</div>

<script>
    // ستا د ډیټابیس معلومات
    const supabaseUrl = 'https://xriyykhfntrjktkdlijl.supabase.co';
    const supabaseKey = 'sb_publishable_A-4CZgoE1jKU8wXU9NNeEQ_hOvw-f_m'; 
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // د نوم لیکنې فعالیت (Sign up)
    async function signup() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await _supabase.auth.signUp({ email, password });

        if (error) {
            document.getElementById('message').innerText = "خطا: " + error.message;
        } else {
            document.getElementById('message').innerText = "بریالی شو! خپل ایمیل تایید کړئ.";
        }
    }

    // د ننوتلو فعالیت (Login)
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

        if (error) {
            document.getElementById('message').innerText = "خطا: " + error.message;
        } else {
            document.getElementById('message').innerText = "تاسو داخل شوئ!";
            window.location.href = "feed.html"; // کله چې لاګ ان شي، فیډ ته ځي
        }
    }
</script>

</body>
</html>
